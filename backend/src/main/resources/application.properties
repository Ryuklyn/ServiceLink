spring.application.name=servicelink

#smtp configurations
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.datasource.url=jdbc:mysql://localhost:3306/servicelink
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Google OAuth2 Config
spring.config.import=optional:file:.env[.properties]
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION}

# ── Sparrow SMS (set token once you receive credits) ──────────────────────────
# sparrow.sms.token=${SPARROW_SMS_TOKEN}
sparrow.sms.token=
sparrow.sms.from=ServiceLink

# ── WhatsApp fallback ─────────────────────────────────────────────────────────
# Set to your WhatsApp Business number (digits only, e.g. 9779800000000)
# If blank, the OTP link will open a self-chat on the user's WhatsApp
whatsapp.business.number=${WHATSAPP_BUSINESS_NUMBER:}

# ── Async email dispatch ──────────────────────────────────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5



spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Supabase Storage Configuration ────────────────────────────────────────────
supabase.url=${SUPABASE_URL}
supabase.bucket=${SUPABASE_BUCKET}
supabase.api-key=${SUPABASE_API_KEY}


# =====================================
# eSewa Sandbox
# =====================================

payment.esewa.merchant-code=${ESEWA_MERCHANT_CODE}
payment.esewa.base-url=${ESEWA_BASE_URL}
payment.esewa.verify-url=${ESEWA_VERIFY_URL}
payment.esewa.secret-key=${ESEWA_SECRET_KEY}

# =====================================
# Khalti Sandbox
# =====================================

payment.khalti.secret-key=${KHALTI_SECRET_KEY}
payment.khalti.base-url=${KHALTI_BASE_URL}
payment.khalti.verify-url=${KHALTI_VERIFY_URL}
payment.khalti.website-url=${KHALTI_WEBSITE_URL}

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM}
twilio.whatsapp.content-sid=${TWILIO_WHATSAPP_CONTENT_SID}